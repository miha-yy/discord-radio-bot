services:
  - type: web
    name: discord-radio-bot
    runtime: node
    plan: free
    # EU region: many of the listed radio streams are European and may
    # geo-block US IPs (Render's default region is Oregon).
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DISCORD_TOKEN
        sync: false
